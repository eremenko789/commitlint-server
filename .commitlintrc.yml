# Commitlint configuration
min_version: "v0.13.0"

formatter: default

severity:
  default: error

rules:
  - header-min-length
  - header-max-length
  - body-max-line-length
  - footer-max-line-length
  - type-enum

settings:
  header-min-length:
    argument: 10

  header-max-length:
    argument: 72

  body-max-line-length:
    argument: 100

  footer-max-line-length:
    argument: 100

  type-enum:
    argument:
      - feat     # New feature
      - fix      # Bug fix
      - docs     # Documentation changes
      - style    # Code style changes (formatting, etc)
      - refactor # Code refactoring
      - perf     # Performance improvements
      - test     # Adding or updating tests
      - build    # Build system changes
      - ci       # CI/CD changes
      - chore    # Other changes
      - revert   # Revert previous commit