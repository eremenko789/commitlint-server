version: '3.8'

services:
  commitlint-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: commitlint-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Монтирование конфигурационного файла
      - ./commitlint-server.yml:/etc/commitlint/commitlint-server.yml:ro
      # Монтирование директории для логов (опционально)
      - ./logs:/var/log/commitlint
    environment:
      - COMMITLINT_CONFIG=/etc/commitlint/commitlint-server.yml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    # Безопасность
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE