before:
  hooks:
    - go mod tidy

builds:
  - id: cli
    main: ./cmd/cli
    binary: commitlint
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w -X github.com/conventionalcommit/commitlint/internal.version=v{{.Major}}.{{.Minor}}.{{.Patch}} -X github.com/conventionalcommit/commitlint/internal.commit={{.FullCommit}} -X github.com/conventionalcommit/commitlint/internal.buildTime={{.Date}}
    flags:
      - -tags=urfave_cli_no_docs
  
  - id: webhook-server
    main: ./cmd/webhook-server
    binary: commitlint-webhook-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    ldflags:
      - -s -w
    flags:
      - -tags=urfave_cli_no_docs

archives:
  - id: cli
    builds:
      - cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE.md
      - README.md
      - README_RU.md
      - .commitlintrc.yml
      - src: webhook-server.yml.example
        dst: webhook-server.yml.example
  
  - id: webhook-server
    builds:
      - webhook-server
    name_template: "{{ .ProjectName }}-webhook-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE.md
      - README.md
      - README_RU.md
      - webhook-server.yml.example
      - docker-compose.yml.example
      - .env.example
      - commitlint-webhook.service.example

checksum:
  name_template: "{{ .ProjectName }}_v{{.Major}}.{{.Minor}}.{{.Patch}}_checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^style:"
      - "^chore:"
      - "^refactor:"
      - "^build:"
      - "^ci:"

release:
  draft: true
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## Release Notes

    This release includes both the CLI tool and the webhook server for Gitea integration.
